version: 2.1

orbs:
  gcp-cloud-run: circleci/gcp-cloud-run@1.0.2

parameters:
  cloud_run_service_name:
    type: string
    default: "websocket-service"

jobs:
  build-and-test:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package-lock.json" }}
            - npm-deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Build TypeScript
          command: npm run build
      - run:
          name: Run tests
          command: npm test

  build-push-deploy:
    machine:
      image: ubuntu-2204:current
    environment:
      IMAGE_URI: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}
    steps:
      - checkout

      - gcp-cloud-run/init:
          use_oidc: true
          google_project_id: GOOGLE_PROJECT_ID
          google_compute_region: GOOGLE_COMPUTE_REGION

      - gcp-cloud-run/build:
          tag: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}

      - gcp-cloud-run/push:
          registry-url: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev
          image: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}

      - gcp-cloud-run/deploy:
          image: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}
          service-name: << pipeline.parameters.cloud_run_service_name >>
          region: GOOGLE_COMPUTE_REGION
          platform: managed
          unauthenticated: true

workflows:
  ci-cd:
    jobs:
      - build-and-test

      - build-push-deploy:
          requires:
            - build-and-test
          filters:
            branches:
              only: main

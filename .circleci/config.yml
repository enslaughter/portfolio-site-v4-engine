version: 2.1

orbs:
  gcp-cli: circleci/gcp-cli@3.2.2

parameters:
  cloud_run_service_name:
    type: string
    default: "ens--portfolio-v4-engine"

jobs:
  build-and-test:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package-lock.json" }}
            - npm-deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Build TypeScript
          command: npm run build
      # No Tests written yet, so leave this out
      # - run:
      #     name: Run tests
      #     command: npm test

  build-push-deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - gcp-cli/install

      - run:
          name: Authenticate with GCP via OIDC
          command: |
            printf '%s' "$CIRCLE_OIDC_TOKEN" > /tmp/oidc_token.txt

            python3 -c "
            import os, json
            config = {
              'type': 'external_account',
              'audience': '//iam.googleapis.com/projects/{}/locations/global/workloadIdentityPools/{}/providers/{}'.format(
                os.environ['GOOGLE_PROJECT_NUMBER'],
                os.environ['WORKLOAD_IDENTITY_POOL_ID'],
                os.environ['WORKLOAD_IDENTITY_PROVIDER_ID']
              ),
              'subject_token_type': 'urn:ietf:params:oauth:token-type:id_token',
              'token_url': 'https://sts.googleapis.com/v1/token',
              'credential_source': {
                'file': '/tmp/oidc_token.txt',
                'format': {'type': 'text'}
              },
              'service_account_impersonation_url': 'https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/{}:generateAccessToken'.format(
                os.environ['SERVICE_ACCOUNT_EMAIL']
              )
            }
            with open('/tmp/gcp_cred_config.json', 'w') as f:
              json.dump(config, f, indent=2)
            print('audience:', config['audience'])
            pn = os.environ['GOOGLE_PROJECT_NUMBER']
            print('project_number: length={}, is_numeric={}'.format(len(pn), pn.isdigit()))
            "

            gcloud auth login --cred-file=/tmp/gcp_cred_config.json --brief --quiet
            gcloud config set project "${GOOGLE_PROJECT_ID}"
            echo "export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_cred_config.json" >> "$BASH_ENV"

      - run:
          name: Build and push image via Cloud Build
          command: |
            IMAGE_URI="${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}"
            gcloud builds submit \
              --tag="$IMAGE_URI" \
              --project="${GOOGLE_PROJECT_ID}"

      - run:
          name: Deploy to Cloud Run
          command: |
            IMAGE_URI="${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}"
            gcloud run deploy "<< pipeline.parameters.cloud_run_service_name >>" \
              --image="$IMAGE_URI" \
              --region="${GOOGLE_COMPUTE_REGION}" \
              --platform=managed \
              --allow-unauthenticated \
              --project="${GOOGLE_PROJECT_ID}"

workflows:
  ci-cd:
    jobs:
      - build-and-test

      - build-push-deploy:
          requires:
            - build-and-test
          filters:
            branches:
              only: main

version: 2.1

orbs:
  gcp-cli: circleci/gcp-cli@3.2.2
  gcp-cloud-run: circleci/gcp-cloud-run@1.0.2

parameters:
  cloud_run_service_name:
    type: string
    default: "ens--portfolio-v4-engine"

jobs:
  build-and-test:
    docker:
      - image: cimg/node:24.14
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package-lock.json" }}
            - npm-deps-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Build TypeScript
          command: npm run build
      # No Tests written yet, so leave this out
      # - run:
      #     name: Run tests
      #     command: npm test

  build-push-deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      - gcp-cli/install

      - run:
          name: Authenticate with GCP via OIDC
          command: |
            echo "$CIRCLE_OIDC_TOKEN" > /tmp/oidc_token.txt
            gcloud iam workload-identity-pools create-cred-config \
              "//iam.googleapis.com/projects/${GOOGLE_PROJECT_NUMBER}/locations/global/workloadIdentityPools/${WORKLOAD_IDENTITY_POOL_ID}/providers/${WORKLOAD_IDENTITY_POOL_PROVIDER_ID}" \
              --service-account="${SERVICE_ACCOUNT_EMAIL}" \
              --credential-source-file=/tmp/oidc_token.txt \
              --credential-source-type=text \
              --output-file=/tmp/gcp_cred_config.json
            gcloud auth login --cred-file=/tmp/gcp_cred_config.json --brief --quiet
            gcloud config set project "${GOOGLE_PROJECT_ID}"
            echo "export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_cred_config.json" >> "$BASH_ENV"

      - gcp-cloud-run/build:
          tag: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}

      - gcp-cloud-run/deploy:
          image: ${GOOGLE_COMPUTE_REGION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${AR_REPO}/<< pipeline.parameters.cloud_run_service_name >>:${CIRCLE_SHA1}
          service-name: << pipeline.parameters.cloud_run_service_name >>
          region: ${GOOGLE_COMPUTE_REGION}
          platform: managed
          unauthenticated: true

workflows:
  ci-cd:
    jobs:
      - build-and-test

      - build-push-deploy:
          requires:
            - build-and-test
          filters:
            branches:
              only: main
